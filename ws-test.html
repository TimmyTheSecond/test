<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dovedale WebSocket Test</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
    #log { height: 80vh; overflow-y: auto; background: #000; padding: 15px; border: 1px solid #333; white-space: pre-wrap; }
    button { padding: 10px 20px; margin: 10px 5px; }
  </style>
</head>
<body>
  <h1>Dovedale WebSocket Tester</h1>
  <button onclick="connect()">Connect</button>
  <button onclick="disconnect()">Disconnect</button>
  <button onclick="clearLog()">Clear Log</button>

  <div id="status">Disconnected</div>
  <div id="log"></div>

  <script>
    let ws = null;

    function log(message) {
      const logEl = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${message}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function connect() {
      if (ws) ws.close();

      const url = "wss://map.dovedale.wiki/ws";
      log(`Connecting to ${url}...`);
      document.getElementById('status').textContent = `Connecting to ${url}...`;

      ws = new WebSocket(url);

      ws.onopen = () => {
        log("✅ WebSocket Connected!");
        document.getElementById('status').textContent = "✅ Connected";
      };

      ws.onmessage = (event) => {
        log("📥 Received: " + event.data);
        console.log("Raw message:", event.data); // also log to console
      };

      ws.onerror = (error) => {
        log("❌ WebSocket Error");
        console.error("WS Error:", error);
      };

      ws.onclose = (event) => {
        log(`🔴 Disconnected (Code: ${event.code})`);
        document.getElementById('status').textContent = `Disconnected (Code: ${event.code})`;
      };
    }

    function disconnect() {
      if (ws) {
        ws.close();
        ws = null;
      }
    }

    function clearLog() {
      document.getElementById('log').textContent = '';
    }

    // Auto connect when page loads
    window.onload = connect;
  </script>
</body>
</html>
